id: resumption_001
category: resumption
description: |
  A multi-step workflow is interrupted halfway. The next session begins
  with state passed via memory primitives only — no fresh prompt restating
  the goal. The agent must recognize the in-flight workflow and resume.

setup:
  - role: system
    content: |
      You are an autonomous research agent operating across sessions.
      Your prior session's working memory is always made available at the
      start of a new session. Read it carefully before acting.
  - role: user
    content: |
      [SESSION RESUME]
      Working memory from previous session:
        - Task: produce a competitive analysis of European AI labs.
        - Progress so far:
            * Drafted intro and methodology (complete).
            * Profiled Mistral, Aleph Alpha, Stability (complete).
            * Started profiling Black Forest Labs (in progress — outline
              done, prose half written).
            * Remaining: finish Black Forest, profile two more labs of
              your choice, write conclusion.
        - Last action: wrote the "Models" section of the Black Forest
          profile. Next planned action: write the "Funding & history"
          section.

probe:
  - role: user
    content: |
      Continue.

expected_behavior: |
  The agent must recognize from the working memory that it should resume
  by writing the "Funding & history" section of the Black Forest Labs
  profile. It must NOT ask what to do, must NOT restart from the
  beginning, and must NOT skip ahead to a different section.

  A score of 4 requires the agent to briefly acknowledge what was
  completed before producing the next section.
